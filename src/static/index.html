<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNPHUSIST-BI | Login Institucional</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%233D9744%22/><text x=%2250%22 y=%2272%22 font-family=%22Georgia, serif%22 font-size=%2265%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>U</text></svg>">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-green: #3D9744;
            --primary-dark: #2A6C30;
            --bg-color: #f0f4f1;
            --text-dark: #1a1f1b;
            --text-muted: #647466;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f0e9 0%, #c4ddc7 100%);
            color: var(--text-dark);
            overflow: hidden;
            position: relative;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s ease-in-out infinite;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: rgba(61, 151, 68, 0.3);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: rgba(42, 108, 48, 0.2);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-20px) scale(1.05);
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 3.5rem 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .login-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .logo-container {
            margin-bottom: 2rem;
            display: inline-block;
        }

        .logo-box {
            background-color: var(--primary-green);
            color: #ffffff;
            width: 110px;
            height: 110px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 15px 30px rgba(61, 151, 68, 0.35);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
        }

        .logo-box:hover {
            transform: scale(1.08) rotate(-3deg);
            box-shadow: 0 20px 40px rgba(61, 151, 68, 0.45);
            background-color: var(--primary-dark);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.75rem;
            line-height: 1.3;
        }

        p {
            font-size: 14.5px;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 48px;
        }

        .custom-google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            color: #3c4043;
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 0 24px;
            height: 48px;
            font-family: "Google Sans", arial, sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
        }

        .custom-google-btn:hover {
            background-color: #f8f9fa;
            box-shadow: 0 1px 3px 0 rgba(60, 64, 67, 0.3), 0 4px 8px 3px rgba(60, 64, 67, 0.15);
        }

        .footer-note {
            margin-top: 2.5rem;
            font-size: 13px;
            color: #88968a;
            font-weight: 500;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .footer-note:hover {
            opacity: 1;
        }

        /* Responsive Styles */
        @media (max-width: 480px) {
            .login-card {
                padding: 2.5rem 1.5rem;
                border-radius: 20px;
            }

            .logo-box {
                width: 80px;
                height: 80px;
            }

            .logo-text {
                font-size: 20px;
            }

            h1 {
                font-size: 20px;
            }

            p {
                font-size: 13px;
                margin-bottom: 2rem;
            }

            .custom-google-btn {
                padding: 0 16px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-container">
                <div class="logo-box">
                    <span class="logo-text">UNPHU</span>
                </div>
            </div>

            <h1>Salud Académica</h1>
            <p>Inicia sesión con tu cuenta institucional para acceder de forma segura a tu Dashboard de BI.</p>

            <div class="google-btn-wrapper">
                <button onclick="oauthSignIn()" class="custom-google-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"
                        style="margin-right: 12px;">
                        <path
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                            fill="#4285F4" />
                        <path
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                            fill="#34A853" />
                        <path
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                            fill="#FBBC05" />
                        <path
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                            fill="#EA4335" />
                    </svg>
                    Iniciar sesión con Google
                </button>
            </div>

            <div class="footer-note">
                Acceso restringido a usuarios @unphu.edu.do
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            // Verificar si venimos de OAuth con un token fragment
            var fragmentString = location.hash.substring(1);
            if (fragmentString.length > 0) {
                var params = {};
                var regex = /([^&=]+)=([^&]*)/g, m;
                while (m = regex.exec(fragmentString)) {
                    params[decodeURIComponent(m[1])] = decodeURIComponent(m[2]);
                }

                if (params['id_token']) {
                    // Limpia la URL haciéndola ver bella de nuevo
                    window.history.replaceState(null, null, window.location.pathname);
                    handleCredentialResponse({ credential: params['id_token'] });
                }
            }
        };

        function oauthSignIn() {
            var oauth2Endpoint = 'https://accounts.google.com/o/oauth2/v2/auth';

            var form = document.createElement('form');
            form.setAttribute('method', 'GET');
            form.setAttribute('action', oauth2Endpoint);

            var params = {
                'client_id': '88334184799-pimhmhk8fvar5mpttnko7dlvljl21o4i.apps.googleusercontent.com',
                'redirect_uri': window.location.origin + '/callback',
                'response_type': 'token id_token',
                'scope': 'openid email profile',
                'include_granted_scopes': 'true',
                'state': 'pass-through value',
                'nonce': Math.random().toString(36).substring(2)
            };

            for (var p in params) {
                var input = document.createElement('input');
                input.setAttribute('type', 'hidden');
                input.setAttribute('name', p);
                input.setAttribute('value', params[p]);
                form.appendChild(input);
            }
            document.body.appendChild(form);
            form.submit();
        }

        function handleCredentialResponse(response) {
            console.log("Token procesado por vía Redirect de Google, enviando al backend...");

            fetch('/auth/google', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: response.credential })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        let msg = data.error;
                        if (data.traceback) msg += "\n\nDETALLES TÉCNICOS:\n" + data.traceback;
                        alert("ERROR: " + msg);
                    } else {
                        // Guardar nombre y datos de UNPHU en sesión temporal
                        sessionStorage.setItem('userName', data.name);

                        if (data.api_data) {
                            sessionStorage.setItem('unphuData', JSON.stringify(data.api_data));
                        }

                        // Redirigir al dashboard
                        window.location.href = "dashboard.html";
                    }
                })
                .catch(err => {
                    console.error("Error de conexión:", err);
                    alert("No se pudo conectar con el servidor backend (Flask).");
                });
        }
    </script>
</body>

</html>
